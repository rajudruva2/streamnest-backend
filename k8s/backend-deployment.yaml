apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamnest-backend
  namespace: streamnest

spec:
  replicas: 1

  selector:
    matchLabels:
      app: streamnest-backend

  template:
    metadata:
      labels:
        app: streamnest-backend

    spec:
      containers:
      - name: backend

        image: rajvam6806/streamnest-backend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        env:

        - name: PORT
          value: "3000"

        - name: NODE_ENV
          value: production

        - name: DATABASE_URL
          value: postgresql://streamnest_user:StreamNest@123@postgres:5432/streamnest
