apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamnest-backend
  namespace: streamnest

spec:
  replicas: 1

  selector:
    matchLabels:
      app: streamnest-backend

  template:
    metadata:
      labels:
        app: streamnest-backend

    spec:
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: streamnest-upload-pvc

      initContainers:
      - name: create-upload-dir
        image: busybox
        command:
        - sh
        - -c
        - |
          mkdir -p /app/uploads
          chmod -R 777 /app/uploads
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads   
      containers:
      - name: backend

        image: rajvam6806/streamnest-backend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        env:

        - name: PORT
          value: "3000"

        - name: NODE_ENV
          value: production

        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: DATABASE_URL
        volumeMounts:
         - name: uploads
           mountPath: /app/uploads     
